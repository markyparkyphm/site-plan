<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Site Planner</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
</head>
<body>
  <div id="sidebar">
    <h1>Site Planner</h1>
    <p id="instructions">
      Click on the map to place boundary points.<br>
      Click the <span style="color:#4ade80">green dot</span> to close the polygon.
    </p>
    <div id="actions">
      <button id="btn-use-boundary" disabled>Use Boundary</button>
      <button id="btn-clear">Clear</button>
    </div>
    <div id="acreage"></div>
    <label class="sidebar-label">
      Setback (ft)
      <input id="input-setback" type="number" value="20" min="0" max="500">
    </label>
    <label class="sidebar-label">
      Basin (% of parcel)
      <input id="input-pond-pct" type="number" value="15" min="1" max="50">
    </label>
    <label class="sidebar-label">
      Basin corner
      <select id="input-basin-corner">
        <option value="SW">SW</option>
        <option value="SE">SE</option>
        <option value="NW">NW</option>
        <option value="NE">NE</option>
      </select>
    </label>
    <label class="sidebar-label">
      Road frontage
      <select id="input-frontage">
        <option value="auto">Auto</option>
        <option value="S">South</option>
        <option value="N">North</option>
        <option value="E">East</option>
        <option value="W">West</option>
      </select>
    </label>
    <div id="road-status" style="font-size:11px;color:#94a3b8;margin-top:-6px;margin-bottom:4px;min-height:14px;"></div>
    <label class="sidebar-label">
      Parking stalls
      <input id="input-parking" type="number" value="50" min="0" max="500">
    </label>
    <label class="sidebar-label">
      Driveways
      <input id="input-driveways" type="number" value="1" min="0" max="4">
    </label>
    <div class="sidebar-section-title">Buildings (up to 5)</div>
    <div id="buildings-list">
      <div class="building-row">
        <input class="b-label" type="text"   placeholder="Label" value="A">
        <input class="b-len"   type="number" placeholder="L ft"  value="200" min="10">
        <input class="b-wid"   type="number" placeholder="W ft"  value="100" min="10">
      </div>
    </div>
    <button id="btn-add-building">+ Add Building</button>
    <div class="sidebar-section-title">AI Hints</div>
    <textarea id="input-ai" rows="3" placeholder='e.g. "put basin NE, 25 ft setback, orient buildings N-S"'></textarea>
    <button id="btn-ai-apply">Apply AI Hints</button>
    <div id="ai-status"></div>
    <button id="btn-solve" disabled>Solve Layout</button>
    <button id="btn-optimize" disabled>Optimize Layout</button>
    <button id="btn-cancel-optimize" style="display:none">Cancel Optimization</button>
    <button id="btn-render" disabled>View Scale Drawing</button>
    <div id="status"></div>
    <div id="stats-panel" style="display:none">
      <div class="sidebar-section-title">Results</div>
      <div class="stat-row"><span class="stat-label">Parcel</span><span id="stat-parcel"></span></div>
      <div class="stat-row"><span class="stat-label">Buildings</span><span id="stat-buildings"></span></div>
      <div class="stat-row"><span class="stat-label">Footprint</span><span id="stat-footprint"></span></div>
      <div class="stat-row"><span class="stat-label">Basin</span><span id="stat-basin"></span></div>
      <div class="stat-row"><span class="stat-label">Parking</span><span id="stat-parking"></span></div>
    </div>
    <div id="score-panel" style="display:none">
      <div class="sidebar-section-title">Score (Retail)</div>
      <div class="stat-row">
        <span class="stat-label">Total</span>
        <span id="score-total"></span>
      </div>
      <div id="score-breakdown"></div>
    </div>
    <div id="optimizer-panel" style="display:none">
      <div class="sidebar-section-title">Optimizer</div>
      <div id="optimizer-winner-label"></div>
      <div id="optimizer-candidates"></div>
    </div>
    <div id="warnings-panel"></div>
  </div>
  <div id="map"></div>
  <div id="canvas-panel" style="display:none">
    <div id="canvas-toolbar">
      <span id="canvas-title">Site Plan</span>
      <button id="btn-export">Download PNG</button>
      <button id="btn-close-canvas">✕</button>
    </div>
    <canvas id="render-canvas" width="900" height="650"></canvas>
  </div>

  <script src="config.js"></script>
  <script>
    window.initMap = function () {
      import('./js/main.js').then(function (m) { m.init(); }).catch(console.error);
    };

    if (!window.MAPS_API_KEY) {
      document.getElementById('map').textContent = 'Error: MAPS_API_KEY missing from config.js';
    } else {
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + window.MAPS_API_KEY + '&callback=initMap&v=weekly';
      s.async = true;
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
