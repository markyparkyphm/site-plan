name: Deploy to Pages
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys
        env:
          MAPS_KEY: ${{ secrets.MAPS_API_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "window.MAPS_API_KEY = \"$MAPS_KEY\";" > config.js
          echo "window.GEMINI_API_KEY = \"$GEMINI_KEY\";" >> config.js
          echo "config.js written ($(wc -c < config.js) bytes)"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
